      <!-- Contact Form -->
      <div class="container text-center">
        <h1>Let's Connect</h1>
        <div class="row">
          <div class="col-md-12">
            <form action="https://formspree.io/f/mayaoodb" method="POST">
      
              <div class="form-group">
                <input type="text" class="form-control" placeholder="Your Name" id="name" required
                  data-validation-required-message="Please enter your name." name="name">
                <p class="help-block text-danger"></p>
              </div>
              <div class="form-group">
                <input type="text" class="form-control" placeholder="Your Email" id="email" required
                  data-validation-required-message="Please enter an email." name=email">
                <p class="help-block text-danger"></p>
              </div>
              <div class="form-group">
                <textarea class="form-control" rows="7" placeholder="Your Message" id="message" required
                  data-validation-required-message="Please enter a message." name="message"></textarea>
                <p class="help-block text-danger"></p>
              </div>
<div class="text-center">
  <div id="success"></div>
  <button type="submit" class="btn btn-dark">
    <i class="button" aria-hidden="true">
    </i>
    Send Message
  </button>
</div>
